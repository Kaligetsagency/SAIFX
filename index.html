<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick PA Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="auth-section" class="container">
        <h2>Ingia / Jisajili</h2>
        <input type="number" id="phone" placeholder="Namba ya Simu (Mfn: 0712345678)" maxlength="10">
        <input type="password" id="pin" placeholder="PIN Namba 4" maxlength="4">
        <p id="auth-error" class="error"></p>
        <button onclick="handleAuth()">Ingia</button>
    </div>

    <div id="payment-section" class="container" style="display: none;">
        <h2>Muda Wako Umeisha</h2>
        <button onclick="initiatePayment('day', 3500)">Siku 1 (Tsh 3,500)</button>
        <button onclick="initiatePayment('week', 18000)">Wiki 1 (Tsh 18,000)</button>
        <button onclick="initiatePayment('month', 35000)">Mwezi 1 (Tsh 35,000)</button>
    </div>

    <div id="app-section" style="display: none;">
        <div class="header">
            <select id="asset-select"><option>Inatafuta Masoko...</option></select>
            <button id="analyze-btn" onclick="runAnalysis()">Chambua (Pure PA)</button>
        </div>

        <div id="live-price-container">
            Bei: <span id="live-price">Inapakua...</span>
        </div>

        <div id="analysis-results" class="results-box"></div>

        <div class="chart-wrapper">
            <button id="load-more-btn" onclick="loadOlderTicks()">Pakua Ticks 5000 za Nyuma</button>
            <div id="tick-chart-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
